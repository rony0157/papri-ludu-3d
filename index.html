<script type="module">
import * as THREE from 'three';

// ==================== GAME ENGINE ====================
class Engine {
  constructor() { this.reset(); }
  reset() {
    this.turn = 0; this.dv = 0; this.dr = false; this.winner = null; this.extra = false;
    this.pl = {
      0: { start: 0, tokens: Array(4).fill(null).map((_,i) => ({ id:i, st:'BASE', sc:0 })) },
      1: { start: 26, tokens: Array(4).fill(null).map((_,i) => ({ id:i, st:'BASE', sc:0 })) }
    };
  }
  roll() {
    if (this.dr || this.winner !== null) return null;
    const randomArray = new Uint32Array(1);
    window.crypto.getRandomValues(randomArray);
    this.dv = (randomArray[0] % 6) + 1;

    this.dr = true;
    if (this.dv === 6) this.extra = true;
    return this.dv;
  }
  validMoves() {
    if (!this.dr || this.winner !== null) return [];
    const v = [];
    this.pl[this.turn].tokens.forEach(t => {
      if (t.st === 'DONE') return;
      if (t.st === 'BASE') { if (this.dv === 6) v.push(t.id); }
      else { if (t.sc + this.dv <= 57) v.push(t.id); }
    });
    return v;
  }
  gpos(pi, sc) {
    if (sc === 0) return { t:'B' };
    if (sc >= 57) return { t:'F' };
    if (sc <= 51) return { t:'T', i:(this.pl[pi].start + sc - 1) % 52 };
    return { t:'H', i:sc - 52 };
  }
  move(tid) {
    if (!this.dr || this.winner !== null) return null;
    const vm = this.validMoves();
    if (!vm.includes(tid)) return null;
    const pi = this.turn;
    const tk = this.pl[pi].tokens[tid];
    const traj = [];
    let cap = null;
    if (tk.st === 'BASE') { tk.st = 'TRACK'; tk.sc = 1; traj.push(this.gpos(pi,1)); }
    else {
      const e = tk.sc + this.dv;
      for (let s = tk.sc+1; s <= e; s++) traj.push(this.gpos(pi,s));
      tk.sc = e;
      if (tk.sc === 57) { tk.st = 'DONE'; this.extra = true; }
      else if (tk.sc > 51) tk.st = 'HOME';
    }
    const fp = this.gpos(pi, tk.sc);
    const safe = [0,8,13,21,26,34,39,47];
    if (fp.t === 'T' && !safe.includes(fp.i)) {
      const oi = 1 - pi;
      this.pl[oi].tokens.forEach(ot => {
        if (ot.st === 'TRACK') {
          const op = this.gpos(oi, ot.sc);
          if (op.t === 'T' && op.i === fp.i) {
            ot.st = 'BASE'; ot.sc = 0;
            cap = { pi: oi, ti: ot.id };
            this.extra = true;
          }
        }
      });
    }
    const win = this.pl[pi].tokens.every(t => t.st === 'DONE');
    if (win) this.winner = pi;
    const ext = this.extra;
    this.dr = false; this.extra = false;
    if (!ext && this.winner === null) this.turn = 1 - pi;
    return { pi, tid, traj, cap, next: this.turn, ext, winner: this.winner };
  }
  pass() { this.dr = false; this.extra = false; this.turn = 1 - this.turn; return this.turn; }
}

// ==================== 3D BOARD ====================
class Board {
  constructor(scene) {
    this.scene = scene; this.g = new THREE.Group();
    this.track = []; this.home = { 0:[], 1:[] }; this.base = { 0:[], 1:[], 2:[], 3:[] };
    this.build();
  }
  build() {
    const s = this.scene, g = this.g;
    const rim = new THREE.Mesh(new THREE.BoxGeometry(14,.48,14), new THREE.MeshLambertMaterial({color:0xe6a1b0}));
    rim.position.y = -0.25; g.add(rim);
    const base = new THREE.Mesh(new THREE.BoxGeometry(13.6,.4,13.6), new THREE.MeshLambertMaterial({color:0x281938}));
    base.position.y = -0.2; g.add(base);

    const cs = 0.8, off = -5.6;
    const gc = (c,r) => ({ x:off+c*cs, y:0.05, z:off+r*cs });
    const cc = (c,r,col,raised=false,isStar=false) => {
      const p = gc(c,r);
      const m = new THREE.Mesh(new THREE.BoxGeometry(cs*.92,raised?.18:.08,cs*.92), new THREE.MeshLambertMaterial({color:col}));
      m.position.set(p.x, raised?.09:.04, p.z); g.add(m);

      if (isStar) {
        const star = new THREE.Mesh(new THREE.ConeGeometry(.24,.2,5), new THREE.MeshBasicMaterial({color:0xffd700}));
        star.position.set(p.x, .18, p.z);
        star.rotation.x = Math.PI;
        g.add(star);
      }

      return p;
    };

    const CR=0xff1a4c, CG=0x00d98c, CY=0xffcc00, CB=0x3399ff, CT=0x3a294c, CS=0x7e54a3;

    this.makeBase(0,0,5,5,CR,0,gc); this.makeBase(9,0,14,5,CY,2,gc);
    this.makeBase(0,9,5,14,CB,3,gc); this.makeBase(9,9,14,14,CG,1,gc);

    const cp = gc(7,7);
    const trophy = new THREE.Mesh(new THREE.ConeGeometry(1.2,1,4), new THREE.MeshBasicMaterial({color:0xff0055}));
    trophy.position.set(cp.x,.5,cp.z); trophy.rotation.y = Math.PI/4; g.add(trophy);
    const heart = new THREE.Mesh(new THREE.SphereGeometry(.35,12,12), new THREE.MeshBasicMaterial({color:0xff3366}));
    heart.geometry.scale(1,1.2,.8); heart.position.set(cp.x,1.1,cp.z); g.add(heart);

    const path = [[1,6],[2,6],[3,6],[4,6],[5,6],[6,5],[6,4],[6,3],[6,2],[6,1],[6,0],[7,0],[8,0],[8,1],[8,2],[8,3],[8,4],[8,5],[9,6],[10,6],[11,6],[12,6],[13,6],[14,6],[14,7],[14,8],[13,8],[12,8],[11,8],[10,8],[9,8],[8,9],[8,10],[8,11],[8,12],[8,13],[8,14],[7,14],[6,14],[6,13],[6,12],[6,11],[6,10],[6,9],[5,8],[4,8],[3,8],[2,8],[1,8],[0,8],[0,7],[0,6]];
    const safeIdx = [0,8,13,21,26,34,39,47];
    path.forEach((p,i) => {
      let col = CT;
      let isStar = safeIdx.includes(i);
      if (i===0) col=CR; else if (i===26) col=CG; else if (isStar) col=CS;
      this.track.push(cc(p[0],p[1],col,false,isStar));
    });

    for (let c=1;c<=6;c++) this.home[0].push(cc(c,7,CR,true));
    for (let c=13;c>=8;c--) this.home[1].push(cc(c,7,CG,true));

    s.add(g);
  }
  makeBase(sc,sr,ec,er,col,pi,gc) {
    const cx=(sc+ec)/2, cy=(sr+er)/2, p=gc(cx,cy);
    const b = new THREE.Mesh(new THREE.BoxGeometry(4.6,.18,4.6), new THREE.MeshLambertMaterial({color:col}));
    b.position.set(p.x,.09,p.z); this.g.add(b);
    const inner = new THREE.Mesh(new THREE.BoxGeometry(3.6,.22,3.6), new THREE.MeshLambertMaterial({color:0xfff0f5}));
    inner.position.set(p.x,.11,p.z); this.g.add(inner);
    [[-1,-1],[1,-1],[-1,1],[1,1]].forEach(o => {
      const px=p.x+o[0], pz=p.z+o[1];
      const sp = new THREE.Mesh(new THREE.CylinderGeometry(.35,.35,.24,12), new THREE.MeshLambertMaterial({color:col}));
      sp.position.set(px,.12,pz); this.g.add(sp);
      this.base[pi].push({x:px,y:.25,z:pz});
    });
  }
}

// ==================== 3D TOKENS ====================
class Tokens {
  constructor(scene, board) {
    this.scene = scene; this.board = board; this.tk = {0:[],1:[]};
    const cols = { 0:{m:0xff0044,c:0xff6699}, 1:{m:0x00cc88,c:0x66ffcc} };
    [0,1].forEach(pi => {
      for (let i=0;i<4;i++) {
        const sp = board.base[pi][i] || {x:0,y:.25,z:0};
        const gr = new THREE.Group();
        const bm = new THREE.Mesh(new THREE.CylinderGeometry(.3,.32,.12,16), new THREE.MeshLambertMaterial({color:cols[pi].m}));
        bm.position.y=.06; gr.add(bm);
        const bd = new THREE.Mesh(new THREE.CylinderGeometry(.12,.26,.45,16), new THREE.MeshLambertMaterial({color:cols[pi].m}));
        bd.position.y=.34; gr.add(bd);
        const tp = new THREE.Mesh(new THREE.SphereGeometry(.16,12,12), new THREE.MeshBasicMaterial({color:cols[pi].c}));
        tp.position.y=.62; gr.add(tp);
        const ar = new THREE.Mesh(new THREE.RingGeometry(.34,.42,16), new THREE.MeshBasicMaterial({color:0xffffff,side:THREE.DoubleSide,transparent:true,opacity:0}));
        ar.rotation.x=Math.PI/2; ar.position.y=.02; gr.add(ar);
        gr.position.set(sp.x,sp.y,sp.z);
        scene.add(gr);
        this.tk[pi].push({mesh:gr,aura:ar,pos:sp,moving:false});
      }
    });
  }
  highlight(pi, ids) {
    [0,1].forEach(p => this.tk[p].forEach((t,i) => {
      if (p===pi && ids.includes(i)) { t.aura.material.opacity=.85; t.mesh.position.y=t.pos.y+.1; }
      else { t.aura.material.opacity=0; if(!t.moving) t.mesh.position.y=t.pos.y; }
    }));
  }
  animMove(pi, ti, coords, cb) {
    const t = this.tk[pi][ti]; if(!t){if(cb)cb();return;}
    t.moving=true; t.aura.material.opacity=0;
    let si=0;
    const step = () => {
      if(si>=coords.length){t.moving=false;t.pos=coords[coords.length-1];if(cb)cb();return;}
      const sp={...t.mesh.position}, ep=coords[si], dur=180, st=performance.now();
      const up = (now) => {
        const p=Math.min((now-st)/dur,1);
        t.mesh.position.x=THREE.MathUtils.lerp(sp.x,ep.x,p);
        t.mesh.position.z=THREE.MathUtils.lerp(sp.z,ep.z,p);
        t.mesh.position.y=THREE.MathUtils.lerp(sp.y,ep.y,p)+.6*Math.sin(p*Math.PI);
        if(p<1) requestAnimationFrame(up); else {si++;step();}
      };
      requestAnimationFrame(up);
    };
    step();
  }
}

// ==================== 3D DICE ====================
class Dice {
  constructor(scene) {
    this.scene=scene; this.rolling=false;
    const geo=new THREE.BoxGeometry(1,1,1), mats=[];
    [1,6,2,5,3,4].forEach(v => {
      const cv=document.createElement('canvas'); cv.width=128; cv.height=128;
      const cx=cv.getContext('2d');
      const gr=cx.createLinearGradient(0,0,128,128); gr.addColorStop(0,'#fff5f7'); gr.addColorStop(1,'#ffd1dc');
      cx.fillStyle=gr; cx.fillRect(0,0,128,128);
      cx.strokeStyle='#e60039'; cx.lineWidth=6; cx.strokeRect(4,4,120,120);
      const dh=(x,y)=>{cx.fillStyle='#ff1a53';cx.beginPath();cx.moveTo(x,y+10);cx.bezierCurveTo(x,y+10,x-12,y-4,x-12,y-12);cx.bezierCurveTo(x-12,y-18,x-4,y-20,x,y-12);cx.bezierCurveTo(x+4,y-20,x+12,y-18,x+12,y-12);cx.bezierCurveTo(x+12,y-4,x,y+10,x,y+10);cx.fill();};
      const ps={1:[[64,64]],2:[[36,36],[92,92]],3:[[36,36],[64,64],[92,92]],4:[[36,36],[92,36],[36,92],[92,92]],5:[[36,36],[92,36],[64,64],[36,92],[92,92]],6:[[36,32],[92,32],[36,64],[92,64],[36,96],[92,96]]};
      if(ps[v]) ps[v].forEach(p=>dh(p[0],p[1]));
      mats.push(new THREE.MeshLambertMaterial({map:new THREE.CanvasTexture(cv)}));
    });
    this.mesh=new THREE.Mesh(geo,mats);
    this.grp=new THREE.Group(); this.grp.add(this.mesh); this.grp.position.set(0,.6,0);
    scene.add(this.grp);
    this.rots={1:{x:0,z:-Math.PI/2},6:{x:0,z:Math.PI/2},2:{x:-Math.PI/2,z:0},5:{x:Math.PI/2,z:0},3:{x:0,z:0},4:{x:Math.PI,z:0}};
  }
  roll(val,cb) {
    if(this.rolling) { if(cb) cb(); return; }
    this.rolling=true;
    const sy=this.grp.position.y, dur=900, st=performance.now();
    const tr=this.rots[val]||{x:0,z:0};
    this.mesh.rotation.set(0,0,0);

    const an=(now)=>{
      const p=Math.min((now-st)/dur,1);
      this.mesh.rotation.x=THREE.MathUtils.lerp(0,tr.x+Math.PI*6,p);
      this.mesh.rotation.y=THREE.MathUtils.lerp(0,Math.PI*4,p);
      this.mesh.rotation.z=THREE.MathUtils.lerp(0,tr.z+Math.PI*6,p);
      this.grp.position.y=sy+Math.sin(p*Math.PI)*2.2;
      if(p<1) requestAnimationFrame(an);
      else {
        this.mesh.rotation.set(tr.x,0,tr.z);
        this.grp.position.y=sy;
        this.rolling=false;
        if(cb) cb();
      }
    };
    requestAnimationFrame(an);
  }
}

// ==================== PARTICLES ====================
class Particles {
  constructor(scene) {
    this.scene=scene; this.petals=[]; this.hearts=[];
    const pg=new THREE.PlaneGeometry(.35,.45);
    const pcv=document.createElement('canvas');pcv.width=64;pcv.height=64;
    const pcx=pcv.getContext('2d');const pgr=pcx.createRadialGradient(32,32,2,32,32,30);
    pgr.addColorStop(0,'#ff1a40');pgr.addColorStop(.7,'#e60039');pgr.addColorStop(1,'rgba(150,0,30,0)');
    pcx.fillStyle=pgr;pcx.beginPath();pcx.arc(32,32,30,0,Math.PI*2);pcx.fill();
    const pm=new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(pcv),transparent:true,side:THREE.DoubleSide,depthWrite:false});
    this.pg=new THREE.Group();
    for(let i=0;i<80;i++){
      const m=new THREE.Mesh(pg,pm);
      m.position.set((Math.random()-.5)*22,Math.random()*16+2,(Math.random()-.5)*22);
      m.rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,Math.random()*Math.PI);
      this.petals.push({mesh:m,sy:.02+Math.random()*.03,rx:(Math.random()-.5)*.03,ry:(Math.random()-.5)*.04,ix:m.position.x});
      this.pg.add(m);
    }
    scene.add(this.pg);
    const hcv=document.createElement('canvas');hcv.width=64;hcv.height=64;
    const hcx=hcv.getContext('2d');hcx.fillStyle='#ff6b8b';hcx.beginPath();
    hcx.moveTo(32,48);hcx.bezierCurveTo(32,48,12,34,12,22);hcx.bezierCurveTo(12,12,22,10,32,20);
    hcx.bezierCurveTo(42,10,52,12,52,22);hcx.bezierCurveTo(52,34,32,48,32,48);hcx.fill();
    const hm=new THREE.SpriteMaterial({map:new THREE.CanvasTexture(hcv),transparent:true,opacity:.8,blending:THREE.AdditiveBlending});
    this.hg=new THREE.Group();
    for(let i=0;i<40;i++){
      const sp=new THREE.Sprite(hm);
      sp.position.set((Math.random()-.5)*18,Math.random()*12-2,(Math.random()-.5)*18);
      const sc=.25+Math.random()*.4; sp.scale.set(sc,sc,1);
      this.hearts.push({sp,bs:sc,sy:.01+Math.random()*.02,ph:Math.random()*Math.PI*2});
      this.hg.add(sp);
    }
    scene.add(this.hg);
  }
  update(t) {
    this.petals.forEach(p=>{p.mesh.position.y-=p.sy;p.mesh.position.x=p.ix+Math.sin(t*2.5+p.mesh.position.y)*.9;p.mesh.rotation.x+=p.rx;p.mesh.rotation.y+=p.ry;if(p.mesh.position.y<-3){p.mesh.position.y=16;p.mesh.position.x=(Math.random()-.5)*22;p.ix=p.mesh.position.x;}});
    this.hearts.forEach(h=>{h.sp.position.y+=h.sy;const s=h.bs*(1+Math.sin(t*3+h.ph)*.3);h.sp.scale.set(s,s,1);if(h.sp.position.y>13){h.sp.position.y=-3;h.sp.position.x=(Math.random()-.5)*18;}});
  }
  kiss(emoji='💋') {
    for(let i=0;i<30;i++){const e=document.createElement('div');e.className='fk';e.innerText=emoji;e.style.left=Math.random()*95+'vw';e.style.top=Math.random()*85+'vh';e.style.fontSize=(28+Math.random()*48)+'px';document.body.appendChild(e);setTimeout(()=>e.remove(),3200);}
  }
}

// ==================== MAIN APP ====================
class App {
  constructor() {
    this.eng = new Engine();

    const urlParams = new URLSearchParams(location.search);
    let room = urlParams.get('room');
    let playerRole = urlParams.get('player');

    if (!room) {
      room = 'papri-' + Math.random().toString(36).substring(2, 7);
      playerRole = '0';
      history.replaceState(null, '', `?room=${room}&player=0`);
    } else if (playerRole === null) {
      playerRole = '1';
      history.replaceState(null, '', `?room=${room}&player=1`);
    }

    this.roomId = room;
    this.myId = parseInt(playerRole, 10);
    this.autoMoveTimer = null;

    try {
      this.bc = new BroadcastChannel(`ludu_room_${this.roomId}`);
      this.bc.onmessage = (e) => this.onMsg(e.data);
    } catch(e) { this.bc = null; }

    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(0x160d29);
    this.scene.fog = new THREE.FogExp2(0x160d29, 0.035);
    
    // Camera FOV 50
    this.cam = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 100);
    this.ren = new THREE.WebGLRenderer({antialias:true,alpha:false});
    this.ren.setSize(innerWidth,innerHeight);
    this.ren.setPixelRatio(Math.min(devicePixelRatio,2));
    document.getElementById('cv').appendChild(this.ren.domElement);

    // High brightness lighting
    this.scene.add(new THREE.AmbientLight(0xfff0f5, 1.6));
    const sun = new THREE.DirectionalLight(0xfff0fa, 1.8); sun.position.set(6,14,8); this.scene.add(sun);
    const pk = new THREE.PointLight(0xff1a53, 2.0, 16); pk.position.set(-6,5,-6); this.scene.add(pk);
    const gn = new THREE.PointLight(0x00cc88, 2.0, 16); gn.position.set(6,5,6); this.scene.add(gn);

    this.fitCam();
    this.board = new Board(this.scene);
    this.tokens = new Tokens(this.scene, this.board);
    this.dice = new Dice(this.scene);
    this.parts = new Particles(this.scene);
    this.ray = new THREE.Raycaster();
    this.mouse = new THREE.Vector2();

    document.getElementById('cv').addEventListener('pointerdown', e => this.click(e));
    window.addEventListener('resize', () => this.fitCam());

    this.ui();
    this.animate();

    document.getElementById('rd').addEventListener('click', () => this.rollDice());
    document.getElementById('bs').addEventListener('click', () => {
      const shareUrl = `${location.origin}${location.pathname}?room=${this.roomId}&player=1`;
      navigator.clipboard.writeText(shareUrl).catch(()=>{});
      alert('Room Link for Papri Copied!\n\nSend this link to Papri:\n' + shareUrl);
    });
    document.querySelectorAll('.bm').forEach(b => b.addEventListener('click', e => {
      const m = e.target.getAttribute('data-m'); if(m) this.chat(m);
    }));
    document.querySelectorAll('.br').forEach(b => b.addEventListener('click', e => {
      const r = e.target.getAttribute('data-r'); if(r) this.react(r,true);
    }));

    this.initNetwork();
  }

  fitCam() {
    const a = innerWidth / innerHeight;
    this.cam.aspect = a;
    
    if (a < 1) { 
      // Portrait phone mode
      const d = Math.max(16, 14.8 / a);
      const py = d * 0.78;
      const pz = d * 0.62;
      this.cam.position.set(0, py, pz);
      this.cam.lookAt(0, -1.2, 0);
    } else {
      // Landscape mode (desktop or phone turned sideways):
      this.cam.position.set(0, 12, 11);
      this.cam.lookAt(0, -0.5, 0);
    }

    this.cam.updateProjectionMatrix();
    this.ren.setSize(innerWidth, innerHeight);
  }

  initNetwork() {
    const st = document.getElementById('status');
    st.textContent = this.myId === 0 
      ? `🌹 Papri ❤️ (Red) | Room: ${this.roomId}`
      : `💖 My Love 💖 (Green) | Room: ${this.roomId}`;

    if (window.Peer) {
      try {
        if (this.myId === 0) {
          this.peer = new Peer(this.roomId, { debug: 1 });
          this.peer.on('open', () => this.ui());
          this.peer.on('connection', (c) => {
            this.conn = c;
            this.setupConn(c);
            st.textContent = `🟢 Connected Live with My Love!`;
            this.popup('My Love Connected! Let\'s play! ❤️');
          });
        } else {
          this.peer = new Peer({ debug: 1 });
          this.peer.on('open', () => {
            this.conn = this.peer.connect(this.roomId, { reliable: true });
            this.setupConn(this.conn);
            st.textContent = `🟢 Connected to Papri's Room!`;
            this.popup('Connected to Papri! Let\'s play! 💖');
          });
        }
      } catch(e) {}
    }
  }

  setupConn(c) {
    const st = document.getElementById('status');
    c.on('open', () => {
      st.textContent = '🟢 Connected Live!';
      st.className = '';
      this.ui();
    });
    c.on('data', (d) => this.onMsg(d));
  }

  onMsg(d) {
    if (d.action === 'DICE_ROLL') {
      this.eng.dv = d.payload.val; this.eng.dr = true;
      if (d.payload.val === 6) this.eng.extra = true;

      const dvBox = document.getElementById('dv-box');
      if (dvBox) dvBox.textContent = d.payload.val;

      if (this.dice) this.dice.roll(d.payload.val, () => this.afterDice());
    } else if (d.action === 'MOVE_TOKEN') {
      this.doMove(d.payload.tokenId, false);
    } else if (d.action === 'PASS_TURN') {
      this.eng.pass(); this.ui();
    } else if (d.action === 'CHAT_MSG') {
      this.parts.kiss('💖'); this.popup(d.payload.msg);
    } else if (d.action === 'REACTION') {
      this.react(d.payload.type, false);
    }
  }

  broadcast(action, payload={}) {
    const msg = { action, payload, sender: this.myId };
    if (this.bc) try { this.bc.postMessage(msg); } catch(e) {}
    if (this.conn && this.conn.open) try { this.conn.send(msg); } catch(e) {}
  }

  rollDice() {
    if (this.eng.turn !== this.myId) return;

    if (this.eng.dr && this.eng.winner === null) {
      const vm = this.eng.validMoves();
      if (vm.length > 0) {
        const bestTokenId = this.getBestTokenToMove(vm);
        this.doMove(bestTokenId, true);
        return;
      }
    }

    if (this.eng.dr || this.eng.winner !== null) return;
    const v = this.eng.roll(); if (!v) return;

    const dvBox = document.getElementById('dv-box');
    if (dvBox) dvBox.textContent = v;

    this.broadcast('DICE_ROLL', {val:v});

    if (this.dice) this.dice.roll(v, () => this.afterDice());
  }

  getBestTokenToMove(validTokenIds) {
    const playerTokens = this.eng.pl[this.eng.turn].tokens;
    let bestId = validTokenIds[0];
    let maxSteps = -1;
    validTokenIds.forEach(id => {
      const t = playerTokens[id];
      if (t.st !== 'BASE' && t.sc > maxSteps) {
        maxSteps = t.sc;
        bestId = id;
      }
    });
    return bestId;
  }

  afterDice() {
    if (this.autoMoveTimer) clearTimeout(this.autoMoveTimer);

    const vm = this.eng.validMoves();
    if (vm.length === 0) {
      const pName = this.eng.turn === 0 ? 'Papri ❤️' : 'My Love 💖';
      const needMsg = (this.eng.dv !== 6 && this.eng.pl[this.eng.turn].tokens.every(t => t.st === 'BASE')) 
        ? `Rolled ${this.eng.dv} 🎲 (Must roll 6 to open token!)`
        : `Rolled ${this.eng.dv} 🎲 (No valid moves)`;
      this.popup(`${pName}\n${needMsg}`);

      setTimeout(() => {
        this.eng.pass();
        this.broadcast('PASS_TURN',{});
        this.ui();
      }, 700);
    } else if (vm.length === 1) {
      this.doMove(vm[0], true);
    } else {
      const allInBase = vm.every(id => this.eng.pl[this.eng.turn].tokens[id].st === 'BASE');
      if (allInBase) {
        this.popup('🎉 ROLLED A 6! Token Unlocked + Extra Turn! 🎲');
        this.doMove(vm[0], true);
      } else {
        this.tokens.highlight(this.eng.turn, vm);
        this.render2DTokenPicker(vm);
        this.popup('👆 Tap token on 3D board OR click button below to move!');
        this.ui();

        this.autoMoveTimer = setTimeout(() => {
          if (this.eng.dr && this.eng.winner === null) {
            const currentVm = this.eng.validMoves();
            if (currentVm.length > 0) {
              const bestId = this.getBestTokenToMove(currentVm);
              this.doMove(bestId, true);
            }
          }
        }, 4000);
      }
    }
  }

  render2DTokenPicker(validTokenIds) {
    const tpBar = document.getElementById('tp-bar');
    if (!tpBar) return;
    tpBar.innerHTML = '';

    const pColorName = this.eng.turn === 0 ? 'Red' : 'Green';

    validTokenIds.forEach((tid) => {
      const tokenObj = this.eng.pl[this.eng.turn].tokens[tid];
      const btn = document.createElement('button');
      btn.className = 'btn-pick-token';
      btn.textContent = tokenObj.st === 'BASE' ? `🔓 Open ${pColorName} Token #${tid+1}` : `🚀 Move ${pColorName} Token #${tid+1} (+${this.eng.dv})`;
      btn.addEventListener('click', () => {
        if (this.autoMoveTimer) clearTimeout(this.autoMoveTimer);
        this.doMove(tid, true);
      });
      tpBar.appendChild(btn);
    });
  }

  doMove(tid, bcast) {
    if (this.autoMoveTimer) clearTimeout(this.autoMoveTimer);

    const tpBar = document.getElementById('tp-bar');
    if (tpBar) tpBar.innerHTML = '';

    const r = this.eng.move(tid); if (!r) return;
    if (bcast) this.broadcast('MOVE_TOKEN', {tokenId:tid});
    const coords = r.traj.map(p => {
      if (p.t === 'T') return this.board.track[p.i];
      if (p.t === 'H') return this.board.home[r.pi][p.i];
      return {x:0,y:.5,z:0};
    });
    this.tokens.animMove(r.pi, tid, coords, () => {
      if (r.cap) {
        try { this.parts.kiss('💥'); } catch(e){}
        const b = this.board.base[r.cap.pi][r.cap.ti];
        const t = this.tokens.tk[r.cap.pi][r.cap.ti];
        if (t) { t.mesh.position.set(b.x,b.y,b.z); t.pos = b; }
        this.popup(`⚔️ TOKEN CAPTURED! ${r.pi === 0 ? 'Papri' : 'My Love'} ate opponent token + Extra Turn! 🎲`);
      }

      this.tokens.highlight(-1,[]);

      if (r.ext && r.winner === null && !r.cap) {
        this.popup('✨ EXTRA TURN! Roll Again! 🎲');
      }

      if (r.winner !== null) this.victory(r.winner); else this.ui();
    });
  }

  click(e) {
    if (this.eng.turn !== this.myId) return;
    if (!this.eng.dr) return;

    const vm = this.eng.validMoves(); if (!vm.length) return;
    this.mouse.x = (e.clientX/innerWidth)*2-1;
    this.mouse.y = -(e.clientY/innerHeight)*2+1;
    this.ray.setFromCamera(this.mouse, this.cam);
    const ms = vm.map(i => this.tokens.tk[this.eng.turn][i].mesh).filter(Boolean);
    const h = this.ray.intersectObjects(ms, true);
    if (h.length) {
      let o = h[0].object; while(o.parent && !o.parent.isGroup) o = o.parent;
      const idx = this.tokens.tk[this.eng.turn].findIndex(t => t.mesh===o||t.mesh===o.parent);
      if (idx!==-1 && vm.includes(idx)) this.doMove(idx, true);
    }
  }

  chat(m) { this.parts.kiss('💖'); this.popup(m); this.broadcast('CHAT_MSG',{msg:m}); }
  react(type, bcast) {
    if (bcast) this.broadcast('REACTION',{type});
    this.parts.kiss({rose:'🌹',kiss:'💋',hug:'🤗',love:'❤️'}[type]||'❤️');
    this.popup({rose:'🌹 Rose Shower!',kiss:'💋 Kisses!',hug:'🤗 Hugs!',love:'❤️ Love!'}[type]||'❤️');
  }
  popup(m) { const e=document.createElement('div');e.className='pop';e.innerText=m;document.body.appendChild(e);setTimeout(()=>e.remove(),2500); }
  victory(w) {
    const wm=document.getElementById('wm'),wt=document.getElementById('wt');
    if(wt) wt.innerText = w===0?'Papri Wins! 🌹':'My Love Wins! 💖';
    if(wm) {wm.style.display='flex';wm.classList.remove('hid');}
  }
  ui() {
    const t = this.eng.turn;
    const isMyTurn = (t === this.myId);

    const p0=document.getElementById('p0'),p1=document.getElementById('p1');
    if(p0) p0.classList.toggle('on',t===0);
    if(p1) p1.classList.toggle('on',t===1);

    const btn=document.getElementById('rd');
    if(btn) {
      btn.disabled = !isMyTurn || (this.eng.dr && this.eng.validMoves().length === 0) || this.eng.winner!==null;
    }

    const tb=document.getElementById('tb');
    if(tb) {
      if (this.eng.winner!==null) tb.innerText='🎉 Game Over!';
      else if (isMyTurn) {
        if (this.eng.dr) {
          tb.innerText = '👆 Tap token or click button below to move!';
          tb.style.color = '#ffcc00';
        } else {
          tb.innerText = t === 0 ? '❤️ Papri\'s Turn! Roll 🎲' : '💖 My Love\'s Turn! Roll 🎲';
          tb.style.color='#ff6699';
        }
      } else {
        tb.innerText = t === 0 ? 'Waiting for Papri\'s roll...' : 'Waiting for Partner\'s roll...';
        tb.style.color='#fff';
      }
    }
  }
  animate(t=0) {
    requestAnimationFrame(t2=>this.animate(t2));
    const s=t*.001;
    this.parts.update(s);
    this.cam.position.x=Math.sin(s*.3)*.4;
    this.cam.lookAt(0,-1.2,0);
    this.ren.render(this.scene,this.cam);
  }
}

window.addEventListener('DOMContentLoaded', () => { window.app = new App(); });
</script>
