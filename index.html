<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Papri & My Love - 3D Romantic Ludo</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>

  <!-- Three.js 3D Canvas -->
  <div id="canvas-container"></div>

  <!-- Romantic Ticker -->
  <div class="love-ticker">
    <span>🌹 Papri + My Love = Forever ❤️ | You are the sweetest part of my life ✨ | Every dice roll brings my heart closer to yours 💖</span>
  </div>

  <!-- UI Overlay -->
  <div id="ui-overlay">
    <header class="interactive">
      <div class="brand">
        <h1>Papri & Lover Ludo <span class="heart-pulse">❤️</span></h1>
      </div>
      <div class="hud-status">
        <div class="voice-hud" id="voice-hud">
          <span class="mic-active-dot"></span>
          <span id="voice-status-text">Connecting...</span>
        </div>
        <button class="btn-icon" id="btn-toggle-mic">🎙️ Mic</button>
        <button class="btn-icon" id="btn-share-room">🔗 Share</button>
      </div>
    </header>

    <div class="game-footer">
      <div class="player-card interactive" id="player-card-0">
        <div class="player-avatar">🌹</div>
        <div class="player-info">
          <h3>Papri ❤️</h3>
          <p id="player-0-status">Red</p>
        </div>
      </div>

      <div class="center-controls interactive">
        <div class="love-messages-bar">
          <button class="btn-msg" data-msg="I love you Papri! ❤️">💌 Love</button>
          <button class="btn-msg" data-msg="You are my Rose! 🌹">🌹 Rose</button>
          <button class="btn-msg" data-msg="1000 kisses! 💋">💋 Kiss</button>
          <button class="btn-msg" data-msg="So gorgeous! ✨">✨ Wow</button>
        </div>
        <div class="reactions-panel">
          <button class="btn-react" data-reaction="rose">🌹</button>
          <button class="btn-react" data-reaction="kiss">💋</button>
          <button class="btn-react" data-reaction="hug">🤗</button>
          <button class="btn-react" data-reaction="love">❤️</button>
        </div>
        <button class="btn-roll-dice" id="btn-roll-dice">🎲 Roll Dice</button>
        <p id="turn-banner-text" class="turn-banner">❤️ Roll the Dice 🎲</p>
      </div>

      <div class="player-card interactive" id="player-card-1">
        <div class="player-avatar">💖</div>
        <div class="player-info">
          <h3>My Love 💖</h3>
          <p id="player-1-status">Green</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Victory Modal -->
  <div class="modal-overlay hidden" id="win-modal">
    <div class="modal-box">
      <h2>🎉 Congratulations! ❤️</h2>
      <h3 id="win-winner-text">Winner!</h3>
      <p>Together forever in love! 🌹✨</p>
      <button class="btn-primary" onclick="location.reload()">🔄 Play Again</button>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
