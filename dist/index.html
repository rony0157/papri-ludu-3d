<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Papri & My Love - 3D Romantic Ludo</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

  <style>
    :root {
      --bg: #0f0a17; --panel: rgba(26, 15, 40, 0.92); --pink: #ff1a53;
      --pink-l: #ff6699; --green: #00cc88; --text: #fff0f5;
      --glass: rgba(255, 102, 153, 0.35);
    }
    * { box-sizing:border-box; margin:0; padding:0; user-select:none; font-family:'Outfit',sans-serif; -webkit-tap-highlight-color:transparent; }
    body,html { width:100%; height:100%; height:100dvh; overflow:hidden; background:var(--bg); color:var(--text); position:fixed; }

    #cv { width:100vw; height:100vh; height:100dvh; position:fixed; top:0; left:0; z-index:1; touch-action:none; background:#140b24; }
    #cv canvas { width:100%!important; height:100%!important; display:block; }

    /* Top Ticker */
    .ticker { position:absolute; top:0; left:0; width:100%; background:linear-gradient(90deg,#ff1a53,#990066); color:#fff; padding:2px 8px; font-size:10px; font-weight:700; z-index:15; text-align:center; white-space:nowrap; overflow:hidden; }
    .ticker span { display:inline-block; animation:tk 18s linear infinite; }
    @keyframes tk { 0%{transform:translateX(100%)} 100%{transform:translateX(-100%)} }

    /* UI Overlay */
    #ui { position:absolute; top:18px; left:0; width:100%; height:calc(100% - 18px); z-index:10; pointer-events:none; display:flex; flex-direction:column; justify-content:space-between; padding:6px; }
    .ia { pointer-events:auto; }

    /* Header */
    header { display:flex; justify-content:space-between; align-items:center; background:var(--panel); backdrop-filter:blur(14px); border:1px solid var(--glass); padding:4px 10px; border-radius:14px; box-shadow:0 4px 20px rgba(0,0,0,.5); }
    .brand h1 { font-family:'Dancing Script',cursive; font-size:18px; background:linear-gradient(135deg,#ff6699,#ff1a53); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .hp { display:inline-block; animation:pu 1.5s infinite; }
    @keyframes pu { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
    
    .hud { display:flex; align-items:center; gap:6px; }
    .bi { background:rgba(255,255,255,.12); border:1px solid var(--glass); color:var(--text); padding:4px 10px; border-radius:10px; cursor:pointer; font-weight:700; font-size:10px; transition:all .2s; }
    .bi:hover { background:var(--pink); }

    /* Status Bar */
    #status { position:fixed; top:46px; left:50%; transform:translateX(-50%); z-index:20; background:rgba(0,204,136,.25); border:1px solid rgba(0,204,136,.6); color:#66ffcc; padding:2px 10px; border-radius:10px; font-size:9px; font-weight:700; pointer-events:none; transition:all .3s; white-space:nowrap; text-shadow:0 1px 2px rgba(0,0,0,.8); }

    /* Footer Layout */
    .footer { display:flex; flex-direction:column; align-items:center; gap:3px; width:100%; margin-bottom:2px; }

    .players-bar { display:flex; justify-content:space-between; align-items:center; width:100%; gap:4px; }
    .pc { background:var(--panel); backdrop-filter:blur(14px); border:2px solid transparent; padding:3px 6px; border-radius:10px; display:flex; align-items:center; gap:4px; transition:all .3s; flex:1; max-width:48%; }
    .pc.on { border-color:var(--pink); box-shadow:0 0 14px rgba(255,26,83,.7); transform:translateY(-1px); }
    .av { width:24px; height:24px; border-radius:50%; background:linear-gradient(135deg,#ff6699,#ff1a53); display:flex; justify-content:center; align-items:center; font-size:11px; border:2px solid #fff; flex-shrink:0; }
    .pi h3 { font-size:10px; font-weight:800; white-space:nowrap; } .pi p { font-size:8px; opacity:.85; }

    .cc { display:flex; flex-direction:column; align-items:center; gap:2px; width:100%; }
    
    .mb { display:flex; gap:3px; overflow-x:auto; max-width:96vw; padding:2px 4px; background:var(--panel); backdrop-filter:blur(10px); border-radius:10px; border:1px solid var(--glass); }
    .bm { background:rgba(255,102,153,.15); border:1px solid var(--glass); color:#fff; font-size:9px; font-weight:600; padding:2px 6px; border-radius:6px; cursor:pointer; white-space:nowrap; }
    
    .rp { display:flex; gap:3px; background:var(--panel); backdrop-filter:blur(12px); padding:2px 6px; border-radius:12px; border:1px solid var(--glass); }
    .br { background:rgba(255,255,255,.08); border:1px solid var(--glass); color:#fff; font-size:11px; padding:2px 6px; border-radius:6px; cursor:pointer; }

    /* Dice Box & Button */
    .dice-container { display:flex; align-items:center; gap:8px; }
    .dice-val-box { width:36px; height:36px; border-radius:10px; background:linear-gradient(135deg,#fff,#ffd1dc); border:2px solid #ff1a53; color:#ff1a53; font-size:18px; font-weight:900; display:flex; justify-content:center; align-items:center; box-shadow:0 4px 12px rgba(255,26,83,.6); }
    #rd { background:linear-gradient(135deg,#ff1a53,#ff6699); color:#fff; font-size:13px; font-weight:800; padding:8px 22px; border:none; border-radius:18px; cursor:pointer; box-shadow:0 6px 18px rgba(255,26,83,.6); transition:all .2s; }
    #rd:disabled { opacity:.4; cursor:not-allowed; transform:none; }
    #tb { font-size:11px; font-weight:800; text-shadow:0 2px 4px rgba(0,0,0,.9); text-align:center; }

    .token-picker-bar { display:flex; gap:4px; margin-top:2px; flex-wrap:wrap; justify-content:center; }
    .btn-pick-token { background:linear-gradient(135deg,#00cc88,#009966); color:#fff; font-size:10px; font-weight:800; padding:4px 10px; border-radius:10px; border:none; cursor:pointer; box-shadow:0 3px 10px rgba(0,204,136,.5); }

    .pop { position:absolute; top:32%; left:50%; transform:translate(-50%,-50%); background:rgba(255,26,83,.96); color:#fff; padding:10px 20px; border-radius:20px; font-size:14px; font-weight:800; box-shadow:0 10px 28px rgba(255,26,83,.8); animation:pf 2.5s forwards; pointer-events:none; z-index:250; text-align:center; white-space:pre-line; }
    @keyframes pf { 0%{opacity:0;transform:translate(-50%,-20%) scale(.5)} 20%{opacity:1;transform:translate(-50%,-50%) scale(1.1)} 80%{opacity:1;transform:translate(-50%,-50%) scale(1)} 100%{opacity:0;transform:translate(-50%,-80%) scale(.8)} }

    .fk { position:fixed; pointer-events:none; z-index:300; animation:fb 2.5s forwards ease-out; filter:drop-shadow(0 4px 12px rgba(255,26,83,.8)); }
    @keyframes fb { 0%{opacity:0;transform:scale(.3) translateY(40px)} 20%{opacity:1;transform:scale(1.3) translateY(0)} 70%{opacity:1;transform:scale(1.1) translateY(-120px)} 100%{opacity:0;transform:scale(.7) translateY(-220px)} }

    .mo { position:fixed; top:0; left:0; width:100vw; height:100vh; height:100dvh; background:rgba(10,5,20,.88); backdrop-filter:blur(10px); display:flex; justify-content:center; align-items:center; z-index:400; }
    .mo.hid { display:none!important; }
    .mx { background:rgba(26,17,40,.95); border:2px solid var(--glass); border-radius:24px; padding:20px; width:90%; max-width:340px; text-align:center; box-shadow:0 16px 48px rgba(0,0,0,.6); }
    .mx h2 { font-family:'Dancing Script',cursive; font-size:28px; margin-bottom:6px; color:var(--pink-l); }
    .mx h3 { font-size:22px; color:var(--pink); margin-bottom:14px; }
    .bp { width:100%; background:linear-gradient(135deg,#ff1a53,#ff6699); color:#fff; padding:10px; border-radius:12px; border:none; font-size:13px; font-weight:700; cursor:pointer; }
  </style>
  <script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.min.js" } }
  </script>
  <script type="module" crossorigin src="./assets/index-7KEuq6Pl.js"></script>
</head>
<body>
  <div id="cv"></div>
  <div class="ticker"><span>🌹 Papri + My Love = Forever ❤️ | Real 3D Ludo Game 🎲</span></div>
  <div id="status">✨ Ready to Play!</div>

  <div id="ui">
    <header class="ia">
      <div class="brand"><h1>Papri Ludo <span class="hp">❤️</span></h1></div>
      <div class="hud">
        <button class="bi" id="bs">🔗 Share Link</button>
      </div>
    </header>

    <div class="footer">
      <div class="players-bar ia">
        <div class="pc" id="p0"><div class="av">🌹</div><div class="pi"><h3>Papri ❤️</h3><p>Red Tokens</p></div></div>
        <div class="pc" id="p1"><div class="av">💖</div><div class="pi"><h3>My Love 💖</h3><p>Green Tokens</p></div></div>
      </div>

      <div class="cc ia">
        <div class="mb">
          <button class="bm" data-m="I love you! ❤️">💌 Love</button>
          <button class="bm" data-m="My Rose! 🌹">🌹</button>
          <button class="bm" data-m="1000 kisses! 💋">💋</button>
          <button class="bm" data-m="Gorgeous! ✨">✨</button>
        </div>
        <div class="rp">
          <button class="br" data-r="rose">🌹</button>
          <button class="br" data-r="kiss">💋</button>
          <button class="br" data-r="hug">🤗</button>
          <button class="br" data-r="love">❤️</button>
        </div>
        <div class="dice-container">
          <div class="dice-val-box" id="dv-box">🎲</div>
          <button id="rd">🎲 Roll Dice</button>
        </div>
        <div class="token-picker-bar" id="tp-bar"></div>
        <p id="tb">❤️ Papri's Turn! Roll 🎲</p>
      </div>
    </div>
  </div>

  <div class="mo hid" id="wm"><div class="mx"><h2>🎉 Congratulations! ❤️</h2><h3 id="wt">Winner!</h3><p>Together forever in love! 🌹</p><button class="bp" onclick="location.reload()">🔄 Play Again</button></div></div>

</body>
</html>
